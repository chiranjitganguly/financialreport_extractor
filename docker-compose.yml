services:
  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # reports, company map, taxonomy
      - docling_cache:/app/.docling_cache
      - hf_cache:/app/.hf_cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: kpi_extractor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"              # exposed for local inspection / migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kpi_extractor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  docling_cache:
  hf_cache:
